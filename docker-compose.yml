version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: risk_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: risk_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d risk_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: risk_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@riskdesk.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

  airflow-init:
    image: apache/airflow:2.8.1-python3.11
    container_name: risk_airflow_init
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://postgres:postgres@postgres:5432/risk_db
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      bash -c "airflow db init &&
      airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com"

  airflow-webserver:
    image: apache/airflow:2.8.1-python3.11
    container_name: risk_airflow_webserver
    restart: always
    ports:
      - "8080:8080"
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://postgres:postgres@postgres:5432/risk_db
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - _PIP_ADDITIONAL_REQUIREMENTS=yfinance fredapi==0.5.0 pandas dbt-postgres python-dotenv
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - FRED_API_KEY=${FRED_API_KEY}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - .:/opt/airflow/project
    command: webserver
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    image: apache/airflow:2.8.1-python3.11
    container_name: risk_airflow_scheduler
    restart: always
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://postgres:postgres@postgres:5432/risk_db
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - _PIP_ADDITIONAL_REQUIREMENTS=yfinance fredapi==0.5.0 pandas dbt-postgres python-dotenv
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - FRED_API_KEY=${FRED_API_KEY}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - .:/opt/airflow/project
    command: scheduler
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

volumes:
  postgres_data:
