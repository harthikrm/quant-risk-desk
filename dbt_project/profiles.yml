quant_risk:
  target: dev
  outputs:
    dev:
      type: postgres
      threads: 4
      host: '{{ env_var("POSTGRES_HOST", "localhost") }}'
      port: '{{ env_var("POSTGRES_PORT", "5433") | as_number }}'
      user: '{{ env_var("POSTGRES_USER", "postgres") }}'
      pass: '{{ env_var("POSTGRES_PASSWORD", "postgres") }}'
      dbname: '{{ env_var("POSTGRES_DB", "risk_db") }}'
      schema: public
